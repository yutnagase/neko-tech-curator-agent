{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-semibold mb-6">📝 最新の技術解説</h2>

<div class="space-y-6">
    {% for exp in explanations %}
    <div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition">
        <h3 class="text-xl font-semibold mb-3">{{ exp.title }}</h3>
        <div class="prose prose-orange max-w-none">
            {{ exp.content | safe }}
        </div>
        <div class="mt-4 flex items-center justify-between text-sm">
            <a href="{{ exp.url }}" target="_blank" 
               class="text-blue-600 hover:underline">🔗 元記事を見る</a>
            <span class="text-gray-500">{{ exp.source }} • {{ exp.date }}</span>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
