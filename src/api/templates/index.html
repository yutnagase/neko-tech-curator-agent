{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
    📝 最新の技術解説 ({{ count }}件)
</h2>

<div class="space-y-8">
    {% for exp in explanations %}
    <div class="bg-white border border-gray-200 rounded-2xl p-8 hover:shadow-lg transition-shadow">
        <h3 class="text-2xl font-bold text-gray-800 mb-4 leading-tight">
            {{ exp.title }}
        </h3>
        
        <div class="prose prose-orange max-w-none text-gray-700 leading-relaxed text-[17px]">
            {{ exp.formatted_content | safe }}
        </div>
        
        <div class="mt-6 pt-6 border-t border-gray-100 flex items-center justify-between text-sm">
            <a href="{{ exp.url }}" target="_blank" 
               class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-700 hover:underline">
                🔗 元記事を見る
            </a>
            <div class="text-gray-500">
                {{ exp.source }} • {{ exp.date }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% if count == 0 %}
<div class="text-center py-20 text-gray-500">
    まだ解説がありません。<br>
    「今日の解説を生成する」ボタンを押してみてください。
</div>
{% endif %}
{% endblock %}
