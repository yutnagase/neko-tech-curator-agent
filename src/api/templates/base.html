<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-orange-600 mb-2">猫でもわかる技術解説</h1>
        <p class="text-gray-600 mb-8">Local LLM × LangGraph で動くAIエージェント</p>
        
        <div class="flex gap-4 mb-8">
            <button hx-post="/run_daily" 
                    hx-target="#result"
                    class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-lg font-medium">
                    今日の解説を生成する
            </button>
        </div>
        
        <div id="result"></div>
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
