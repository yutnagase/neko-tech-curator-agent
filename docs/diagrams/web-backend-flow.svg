<svg width="860" height="620" viewBox="0 0 860 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; }
      .box { fill: #f0f9ff; stroke: #0284c8; stroke-width: 3; rx: 12; ry: 12; }
      .arrow { stroke: #475569; stroke-width: 3.5; marker-end: url(#arrowhead); }
      .title { font-size: 18px; font-weight: 700; fill: #0c4a6e; }
      .label { font-size: 14.5px; fill: #334155; }
      .small { font-size: 13px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="80" y="50" width="180" height="70" class="box"/>
  <text x="170" y="78" text-anchor="middle" class="title">Browser</text>
  <text x="170" y="98" text-anchor="middle" class="label">（ユーザー）</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="85" x2="330" y2="85" class="arrow"/>

  <!-- FastAPI -->
  <rect x="340" y="40" width="190" height="90" class="box"/>
  <text x="435" y="68" text-anchor="middle" class="title">FastAPI</text>
  <text x="435" y="88" text-anchor="middle" class="label">main.py + routes.py</text>

  <!-- Arrow 2 -->
  <line x1="435" y1="135" x2="435" y2="185" class="arrow"/>

  <!-- Database -->
  <rect x="340" y="200" width="190" height="85" class="box"/>
  <text x="435" y="228" text-anchor="middle" class="title">Database Layer</text>
  <text x="435" y="248" text-anchor="middle" class="label">SQLite + LanceDB</text>
  <text x="435" y="268" text-anchor="middle" class="small">get_latest_explanations()</text>

  <!-- Arrow 3 -->
  <line x1="435" y1="290" x2="435" y2="335" class="arrow"/>

  <!-- Jinja2 Templates -->
  <rect x="340" y="350" width="190" height="85" class="box"/>
  <text x="435" y="378" text-anchor="middle" class="title">Jinja2 Templates</text>
  <text x="435" y="398" text-anchor="middle" class="label">index.html / base.html</text>

  <!-- Arrow 4 -->
  <line x1="435" y1="440" x2="435" y2="480" class="arrow"/>

  <!-- HTMX -->
  <rect x="340" y="495" width="190" height="80" class="box"/>
  <text x="435" y="523" text-anchor="middle" class="title">HTMX + Tailwind</text>
  <text x="435" y="543" text-anchor="middle" class="label">動的インタラクション</text>

  <!-- Return Arrow -->
  <line x1="340" y1="535" x2="170" y2="535" stroke="#475569" stroke-width="3.5" />
  <line x1="170" y1="535" x2="170" y2="130" class="arrow"/>
</svg>